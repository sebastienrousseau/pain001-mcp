codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
  hide_project_coverage: no
  hide_branch_coverage: no

ignore:
  - "tests"
  - "examples"

flags:
  unittests:
    paths:
      - pain001_mcp
    carryforward: yes

github:
  checks:
    annotations: yes
