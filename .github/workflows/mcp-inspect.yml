name: MCP Protocol Conformance

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    name: MCP Inspector (tools/list, resources/list, prompts/list)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pain001-mcp (with core pain001 dep)
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* ]]; then
            pip install "pain001 @ git+https://github.com/sebastienrousseau/pain001@${REF}" || pip install "pain001>=0.0.52,<0.0.54"
          else
            pip install "pain001>=0.0.52,<0.0.54"
          fi
          pip install .

      - name: List tools via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli pain001-mcp --method tools/list

      - name: List resources via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli pain001-mcp --method resources/list

      - name: List prompts via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli pain001-mcp --method prompts/list
