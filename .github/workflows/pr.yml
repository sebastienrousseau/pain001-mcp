name: PR Gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: PR sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pain001 + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* ]] && \
             git ls-remote --exit-code --heads \
               https://github.com/sebastienrousseau/pain001 "$REF" >/dev/null 2>&1; then
            pip install "pain001 @ git+https://github.com/sebastienrousseau/pain001@${REF}"
          else
            pip install "pain001>=0.0.52,<0.0.54"
          fi
          pip install -e .
          pip install pytest pytest-cov interrogate ruff black mypy types-jsonschema

      - name: Lint
        run: |
          ruff check pain001_mcp/ tests/
          black --check pain001_mcp/ tests/

      - name: Type check
        run: mypy pain001_mcp/

      - name: Tests with 100% coverage gate
        run: |
          pytest tests/ \
            --cov=pain001_mcp --cov-branch \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=100

      - name: Docstring coverage
        run: interrogate -c pyproject.toml pain001_mcp

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
