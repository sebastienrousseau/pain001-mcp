name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "pain001_mcp/__init__.py"
      - "pyproject.toml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* || "$REF" == fix/* ]] && \
             git ls-remote --exit-code --heads \
               https://github.com/sebastienrousseau/pain001 "$REF" >/dev/null 2>&1; then
            pip install "pain001 @ git+https://github.com/sebastienrousseau/pain001@${REF}"
          else
            pip install "pain001>=0.0.54,<0.0.55"
          fi
          pip install .
          pip install sphinx furo "myst-parser[linkify]" sphinx-autodoc-typehints sphinx-copybutton

      - name: Build Sphinx documentation
        run: |
          cd docs
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/_build/html"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
