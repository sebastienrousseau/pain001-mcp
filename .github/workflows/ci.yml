name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # pain001-mcp depends on the core pain001 library, which is not yet
      # published to PyPI. Install it from its GitHub repository first,
      # then install this package and its dev dependencies on top.
      - name: Install pain001 (from GitHub) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/pain001.git@feat/v0.0.52"
          pip install -e .
          pip install pytest pytest-cov interrogate

      - name: Run tests with the 100% coverage gate
        run: |
          pytest tests/ \
            --cov=pain001_mcp --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100 -v

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml pain001_mcp

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pain001 (from GitHub) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/pain001.git@feat/v0.0.52"
          pip install -e .
          pip install ruff black mypy types-jsonschema

      - name: Ruff check
        run: ruff check pain001_mcp/ tests/

      - name: Black check
        run: black --check pain001_mcp/ tests/

      - name: Mypy
        run: mypy pain001_mcp/

  examples:
    name: Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pain001 (from GitHub) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/pain001.git@feat/v0.0.52"
          pip install -e .

      - name: Run examples
        run: |
          python examples/01_mcp_tools.py
          python examples/02_validate_pipeline.py
          python examples/03_parse_bank_replies.py
