name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pain001_mcp/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pain001_mcp/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (and publish on tag/main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=pain001-mcp
            org.opencontainers.image.description=Model Context Protocol server for the pain001 ISO 20022 library.
            org.opencontainers.image.source=https://github.com/sebastienrousseau/pain001-mcp
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build (and push on non-PR events)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Smoke-test the built image
        # On PRs we have a local image (load: true on the buildx layer
        # below would defeat multi-arch); on push events we pull from
        # GHCR to verify the registry copy actually runs.
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "smoke-testing $IMAGE"
          docker pull "$IMAGE"
          # The container ENTRYPOINT is pain001-mcp, which reads MCP
          # JSON-RPC on stdin. We close stdin immediately; a non-zero
          # exit is fine, but an import error would show on stderr.
          docker run --rm -i "$IMAGE" </dev/null 2>&1 | head -20 || true
          # Re-run the HEALTHCHECK's import check explicitly.
          docker run --rm --entrypoint python "$IMAGE" \
            -c "import pain001_mcp; print('pain001-mcp', pain001_mcp.__version__, 'OK')"
