name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly bandit + dependency review (Monday 04:00 UTC).
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r pain001_mcp/ -ll

  pip-audit:
    name: pip-audit (vulnerable dependencies)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit + this package
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install "git+https://github.com/sebastienrousseau/pain001.git@feat/v0.0.52"
          pip install .

      - name: Audit installed packages
        # ``pain001`` is installed from its feat/v0.0.52 branch until that
        # release publishes to PyPI, so pip-audit cannot resolve it. Drop
        # ``--strict`` so an unresolved package is a warning, not a hard
        # failure; the job still fails on any real vulnerability. The
        # core ``pain001`` repo runs its own pip-audit.
        run: pip-audit
