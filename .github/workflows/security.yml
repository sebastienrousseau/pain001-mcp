name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly bandit + dependency review (Monday 04:00 UTC).
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r pain001_mcp/ -ll

  pip-audit:
    name: pip-audit (vulnerable dependencies)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit + this package
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install "pain001>=0.0.52,<0.0.53"
          pip install .

      - name: Audit installed packages
        run: pip-audit
